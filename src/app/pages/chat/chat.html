<div style="padding:20px; max-width:600px;">

  <h2>Chat</h2>

  <div
    style="
      border:1px solid #ccc;
      height:300px;
      overflow:auto;
      padding:10px;
      margin-bottom:10px;">

    <div *ngFor="let msg of chatService.messages">

      <b>{{msg.senderId}}</b>

      :

      {{msg.message}}

    </div>

  </div>

  <input
    [(ngModel)]="message"
    placeholder="Type message"
    style="width:80%; padding:10px;">

  <button
    (click)="sendMessage()"
    style="padding:10px;">

    Send

  </button>

</div>
