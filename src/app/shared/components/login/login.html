<div class="main">
  <app-languageswitcher class="lang-btn"></app-languageswitcher>

  <div class="form-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <!-- <div class="brand">
        <div class="brand-logo">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0e7360" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.5-1.6 3-3.6 3-6a5 5 0 0 0-9-3 5 5 0 0 0-9 3c0 2.4 1.5 4.4 3 6l6 6 6-6z"/><path d="M8 11h2l1.5-3 2 5L15 11h1"/></svg>
        </div>
        <div class="brand-name">Provider Portal</div>
      </div> -->

      <div class="header">
        <h2>{{'LOGIN.login' | transloco}}</h2>
        <p class="tiny">Sign in to manage approvals &amp; claims.</p>
      </div>

      <!-- Reactive Form -->
      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <!-- Username -->
        <div class="form-group">
          <label for="username">{{'LOGIN.username' | transloco}}</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c.9-3.6 3.7-5.4 7-5.4s6.1 1.8 7 5.4"/></svg>
            <input
              type="text"
              id="username"
              class="form-input"
              [placeholder]="'LOGIN.userplaceholder' | transloco"
              formControlName="userName"
            />
          </div>
          <!-- validation -->
          <small
            *ngIf="loginForm.get('userName')?.touched && loginForm.get('userName')?.invalid"
            class="text-danger"
          >
            {{'LOGIN.userValid' | transloco}}
          </small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">{{'LOGIN.password' | transloco}}</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="form-input password-input"
              placeholder="••••••••"
              formControlName="password"
            />

            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()"
              aria-label="Toggle password visibility"
            >
              <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <!-- Eye Off Icon (hidden) -->
              <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="m1 1 22 22"/></svg>
            </button>
          </div>
          <small
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="text-danger"
          >
            {{'LOGIN.passValid' | transloco}}
          </small>
        </div>

        <!-- Remember Me -->
        <!-- <div class="remember-me">
          <input type="checkbox" id="rememberMe" formControlName="rememberMe" />
          <label for="rememberMe">{{'LOGIN.remember' | transloco}}</label>
        </div> -->

        <!-- Error -->
        <div class="banner err" *ngIf="errorMessage()">
          <div class="bicon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
          </div>
          <p>{{ errorMessage() }}</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading()">
          @if (isLoading()) {
            <span class="spinner" aria-hidden="true"></span>
          } @else {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          }
          {{ (isLoading() ? 'LOGIN.loggingIn' : 'LOGIN.login') | transloco }}
        </button>

      </form>

      <div class="footer">
        <span>{{'LOGIN.developed' | transloco}}</span>
        <span class="brand-tag">AspirCode</span>
      </div>
    </div>
  </div>
</div>
