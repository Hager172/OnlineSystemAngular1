<div class="main">
<div class="container">
<app-languageswitcher class="lang-btn"></app-languageswitcher>
  <div class="form-wrapper">
    <div class="login-card">
      <div class="header">
        <h2>{{'LOGIN.login' | transloco}}</h2>
      </div>

      <!-- Reactive Form -->
      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <!-- Username -->
        <div class="form-group">
          <label for="username">{{'LOGIN.username' | transloco}}</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <input
              type="text"
              id="username"
              class="form-input"
              [placeholder]="'LOGIN.userplaceholder' | transloco"
              formControlName="userName"
            />
          </div>
          <!-- validation -->
          <small
            *ngIf="loginForm.get('userName')?.touched && loginForm.get('userName')?.invalid"
            class="text-danger"
          >
            <!-- Username is required -->
            {{'LOGIN.userValid' | transloco}}
          </small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">{{'LOGIN.password' | transloco}}</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="form-input password-input"
              placeholder="••••••••"
              formControlName="password"
            />

            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()"
            >
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <!-- Eye Off Icon (hidden) -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
           <small
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="text-danger"
          >
            <!-- Password is required -->
            {{'LOGIN.passValid' | transloco}}
          </small>
        </div>

        <!-- Remember Me -->
        <div class="remember-me">
          <input type="checkbox" formControlName="rememberMe" />
          <label>{{'LOGIN.remember' | transloco}}</label>
        </div>

        <!-- Error -->
        <p class="error" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </p>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
           {{'LOGIN.login' | transloco}}
        </button>

      </form>

      <div class="footer">
        <span>{{'LOGIN.developed' | transloco}}</span>
        <span class="brand">AspirCode</span>
      </div>
    </div>
  </div>
</div>
</div>
