<div class="docs">
  <aside class="left-sidebar pt-4 d-lg-block" id="navbar-example3" data-simplebar="init">
    <div class="simplebar-wrapper" style="margin: -24px 0px 0px;">
      <div class="simplebar-mask">
        <div class="simplebar-offset" style="right: 0px; bottom: 0px;">
          <div class="simplebar-content-wrapper" style="height: 100%; overflow: hidden scroll;">
            <div class="simplebar-content" style="padding: 24px 0px 0px;">
              
              <div class="scroll-sidebar">
                <nav class="sidebar-nav">
                  
                  <div class="navbar-brand d-flex align-items-center justify-content-between px-4">
                    <a href="index.html">
                      <b class="logo-icon">
                        <img src="../../styles/dist/images/matdash/logo-dark.svg" alt="IQ-Health" class="dark-logo">
                      </b>
                    </a>
                  </div>

                  <ul id="sidebarnav" class="mt-4">
                    <nav class="nav nav-pills flex-column sidebar-nav">
                      <ul class="list-unstyled in">
                        
                        <li class="nav-small-cap">
                          <span class="hide-menu">Getting Started</span>
                        </li>

                        <!-- 👇 السحر هنا: بنستخدم auth.pages$ مباشرة مع الـ async -->
                        <li *ngFor="let page of (auth.pages$ | async) || []" class="sidebar-item">
                          <a class="nav-link sidebar-link d-flex align-items-center" style="cursor: pointer;">
                            <i class="fas fa-house fa-s me-3"></i>
                            {{ getPageName(page) }}
                          </a>
                        </li>
                        <!-- 👆 علامة الـ || [] دي عشان لو الداتا لسه بتحمل ميديناش Error -->

                      </ul>
                    </nav>
                  </ul>
                </nav>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </aside>
</div>
