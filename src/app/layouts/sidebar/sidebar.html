<!-- Mobile toggle button (hamburger / close) -->
<button
  type="button"
  class="sidebar-fab"
  [class.is-open]="isMobileOpen"
  (click)="toggleMobile()"
  [attr.aria-expanded]="isMobileOpen"
  aria-controls="app-sidebar-nav"
  aria-label="Toggle navigation menu">
  <i class="fas" [class.fa-bars]="!isMobileOpen" [class.fa-xmark]="isMobileOpen"></i>
</button>

<!-- Backdrop for the mobile off-canvas drawer -->
<div
  class="sidebar-backdrop"
  [class.is-visible]="isMobileOpen"
  (click)="closeMobile()"
  aria-hidden="true"></div>

<aside
  id="app-sidebar-nav"
  class="app-sidebar"
  [class.is-open]="isMobileOpen"
  [class.is-collapsed]="isCollapsed"
  [class.is-rtl]="isRtl"
  [attr.dir]="isRtl ? 'rtl' : 'ltr'">

  <!-- Sidebar header: section label + desktop collapse toggle -->
  <div class="app-sidebar__header">
    <span class="app-sidebar__title">{{ isRtl ? 'القائمة' : 'Menu' }}</span>
    <button
      type="button"
      class="app-sidebar__collapse"
      (click)="toggleCollapsed()"
      [attr.aria-pressed]="isCollapsed"
      [attr.aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
      [title]="isCollapsed ? 'Expand' : 'Collapse'">
      <i class="fas" [class.fa-angles-left]="!isRtl" [class.fa-angles-right]="isRtl"></i>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="app-sidebar__nav" aria-label="Primary">

    <ul class="app-sidebar__list">
      <ng-container *ngFor="let page of (auth.pages$ | async) || []; trackBy: trackByPage">

       

        <!-- Leaf item: page with no children -->
        <ng-template #leafItem>
          <li class="app-sidebar__item">
            <a
              *ngIf="getRoute(page); else leafBtn"
              class="app-sidebar__link"
              [routerLink]="getRoute(page)"
              routerLinkActive="is-active"
              (click)="closeMobile()"
              [title]="getPageName(page)">
              <i class="app-sidebar__icon" [ngClass]="getPageIcon(page)" aria-hidden="true"></i>
              <span class="app-sidebar__label">{{ getPageName(page) }}</span>
            </a>
            <ng-template #leafBtn>
              <button
                type="button"
                class="app-sidebar__link"
                [class.is-active]="isActive(page)"
                (click)="selectPage(page)"
                [title]="getPageName(page)">
                <i class="app-sidebar__icon" [ngClass]="getPageIcon(page)" aria-hidden="true"></i>
                <span class="app-sidebar__label">{{ getPageName(page) }}</span>
              </button>
            </ng-template>
          </li>
        </ng-template>

      </ng-container>
